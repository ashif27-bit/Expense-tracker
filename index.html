<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>
                <i class="fa-solid fa-wallet text-gradient"></i>
                <span>Tracker<span class="pro-badge">Pro</span></span>
            </h1>
            <button id="themeBtn" aria-label="Toggle Theme">🌙</button>
        </header>

        <div class="balance-card">
            <h3>Current Balance</h3>
            <h1 id="balance">₹0.00</h1>
        </div>

        <div class="summary-container">
            <div class="summary-card income">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-arrow-trend-up"></i>
                </div>
                <div>
                    <h3>Income</h3>
                    <p id="income">₹0.00</p>
                </div>
            </div>

            <div class="summary-card expense">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-arrow-trend-down"></i>
                </div>
                <div>
                    <h3>Expense</h3>
                    <p id="expense">₹0.00</p>
                </div>
            </div>
        </div>

        <section class="section-card">
            <h2><i class="fa-solid fa-circle-plus"></i> Add Transaction</h2>
            <form id="transaction-form">
                <div class="input-group">
                    <input type="text" id="text" placeholder="Description" required>
                </div>
                <div class="input-group">
                    <input type="number" id="amount" placeholder="Amount (₹)" required min="0.01" step="0.01">
                </div>
                <div class="grid-fields">
                    <select id="category">
                        <option value="Food">Food</option>
                        <option value="Travel">Travel</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Health">Health</option>
                        <option value="Education">Education</option>
                        <option value="Salary">Salary</option>
                        <option value="Others">Others</option>
                    </select>

                    <select id="type">
                        <option value="income">Income</option>
                        <option value="expense" selected>Expense</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-plus"></i> Add Entry
                </button>
            </form>
        </section>

        <section class="section-card filter-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search" placeholder="Search transactions...">
            </div>

            <div class="filters">
                <select id="filterType">
                    <option value="all">All Types</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>

                <select id="sortBy">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="high">Highest Amount</option>
                    <option value="low">Lowest Amount</option>
                </select>
            </div>
        </section>

        <section class="section-card history-section">
            <h2>
                <i class="fa-solid fa-clock-rotate-left"></i> Transaction History
            </h2>
            <ul id="list" class="transaction-list">
                </ul>
        </section>

        <section class="section-card report-section">
            <h2>
                <i class="fa-solid fa-chart-pie"></i> Periodical Summary
            </h2>
            <div class="reports-grid">
                <div class="report-box" id="monthReport"></div>
                <div class="report-box" id="yearReport"></div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
